name: stock-bot

on:
  schedule:
    - cron: "0 23 * * *" 
  workflow_dispatch:
  
jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID1: ${{ secrets.USER_ID1 }}
